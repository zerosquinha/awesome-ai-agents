# Blueprint do Render (deve ficar na RAIZ do repositorio).
# Cria o servico do bot do Telegram automaticamente (Render -> New -> Blueprint).
# Os segredos (sync:false) devem ser preenchidos no painel do Render,
# nunca neste arquivo, pois ele vai para o GitHub.
services:
  - type: web
    name: telegram-pergunta-bot
    runtime: node
    plan: free
    rootDir: telegram-pergunta-bot
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: OWNER_NAME
        value: Ze
      - key: FORWARD_TO_EMAIL
        value: ze.rosquinha3@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: ONLY_WHEN_MENTIONED_IN_GROUPS
        value: "false"
      - key: FORWARD_COOLDOWN_HOURS
        value: "1"
      # Remetente do Resend (sem dominio proprio, use o de testes abaixo).
      - key: RESEND_FROM
        value: onboarding@resend.dev
      # Segredos: preencha no painel do Render (Environment), nao aqui.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # Envio de e-mail via Resend (API HTTP). Recomendado no Render,
      # pois o plano gratuito bloqueia SMTP. Crie em https://resend.com
      - key: RESEND_API_KEY
        sync: false
      # SMTP (opcional / fallback local). Pode deixar em branco no Render.
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
